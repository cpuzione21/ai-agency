<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agency - Bisnis Digital</title>
<style>
/* Reset CSS */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  font-family: Arial, sans-serif;
}
/* Navbar CSS */
.navbar {
  background-color: #333;
  color: #fff;
  padding: 15px;
}
.navbar a {
  color: #fff;
  text-decoration: none;
  margin-right: 15px;
}
/* Hero Section CSS */
.hero {
  background-color: #f9f9f9;
  text-align: center;
  padding: 100px 0;
}
.hero h1 {
  font-size: 2.5rem;
  margin-bottom: 20px;
}
.hero p {
  font-size: 1.2rem;
  margin-bottom: 40px;
}
/* Pricing CSS */
.pricing {
  background-color: #eee;
  text-align: center;
  padding: 50px 0;
}
.pricing h2 {
  color: #333;
  font-size: 2rem;
  margin-bottom: 20px;
}
.pricing p {
  color: #777;
  font-size: 1.1rem;
  margin-bottom: 30px;
}
/* Footer CSS */
.footer {
  background-color: #333;
  color: #fff;
  text-align: center;
  padding: 15px 0;
}
/* Contact Section CSS */
.contact {
  background-color: #f9f9f9;
  text-align: center;
  padding: 100px 0;
}
.contact button {
  background-color: #333;
  color: #fff;
  padding: 10px 20px;
  border: none;
  cursor: pointer;
}

/* Responsive CSS */
@media (max-width: 768px) {
  .navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
  }
  .navbar a {
    margin: 0;
  }
}

</style>
</head>
<body>
<!-- Navbar -->
<nav class="navbar">
  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Services</a>
  <a href="#">Contact</a>
</nav>

<!-- Hero Section -->
<section class="hero">
  <h1>AI Agency - Bisnis Digital</h1>
  <p>Your one-stop solution for all your digital business needs.</p>
  <button>Contact Us</button>
</section>

<!-- Pricing Section -->
<section class="pricing">
  <h2>Pricing</h2>
  <p>Choose the best plan that suits your business goals.</p>
  <!-- Insert Pricing Plans Here -->
</section>

<!-- Footer -->
<footer class="footer">
  <p>&copy; 2023 AI Agency. All rights reserved.</p>
</footer>

<!-- Contact Section -->
<section class="contact">
  <h2>Contact Us</h2>
  <p>Ready to take your business to the next level? Contact us now!</p>
  <button>Get in Touch</button>
</section>

</body>
</html>
