<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agency Bisnis Digital</title>
<style>
/* Reset CSS */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
}

/* Navbar */
.navbar {
  background-color: #333;
  color: white;
  padding: 10px 20px;
  display: flex;
  justify-content: space-between;
}

.navbar a {
  color: white;
  text-decoration: none;
}

/* Hero Section */
.hero {
  background-color: #f4f4f4;
  text-align: center;
  padding: 50px 0;
}

/* Pricing */
.pricing {
  text-align: center;
  background-color: #e9e9e9;
  padding: 50px 0;
}

/* Footer */
.footer {
  background-color: #333;
  color: white;
  text-align: center;
  padding: 20px 0;
}

/* Contact Section */
.contact {
  background-color: #f9f9f9;
  text-align: center;
  padding: 50px 0;
}

.button {
  display: inline-block;
  padding: 10px 20px;
  background-color: #ff3366;
  color: white;
  text-decoration: none;
  border-radius: 5px;
}

@media (max-width: 768px) {
  .navbar {
    flex-direction: column;
  }
}

</style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
  <div class="logo">
    <a href="#">AI Agency bisnis digital</a>
  </div>
  <div class="menu">
    <a href="#pricing">Pricing</a>
    <a href="#contact">Contact</a>
  </div>
</div>

<!-- Hero Section -->
<section class="hero">
  <h1>Welcome to AI Agency</h1>
  <p>Your partner in digital business solutions</p>
  <a href="#" class="button">Get Started</a>
</section>

<!-- Pricing -->
<section id="pricing" class="pricing">
  <h2>Pricing</h2>
  <p>Choose the perfect plan for your business</p>
  <!-- Pricing options go here -->
</section>

<!-- Footer -->
<footer class="footer">
  &copy; 2022 AI Agency. All Rights Reserved.
</footer>

<!-- Contact Section -->
<section id="contact" class="contact">
  <h2>Contact Us</h2>
  <p>Have a question? Reach out to us!</p>
  <a href="mailto:info@aiagency.com" class="button">Contact</a>
</section>

</body>
</html>
