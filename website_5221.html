<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agency - Landing Page</title>
<style>
    /* CSS Reset */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    body {
        font-family: Arial, sans-serif;
    }

    /* Navbar */
    .navbar {
        background-color: #333;
        color: #fff;
        padding: 10px 20px;
        display: flex;
        justify-content: space-between;
    }

    /* Hero Section */
    .hero {
        background-image: url('hero-bg.jpg');
        background-size: cover;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        color: #fff;
    }

    .hero h1 {
        font-size: 36px;
        margin-bottom: 20px;
    }

    /* Pricing */
    .pricing {
        background-color: #f4f4f4;
        padding: 50px;
        text-align: center;
    }

    /* Footer */
    .footer {
        background-color: #333;
        color: #fff;
        padding: 20px;
        text-align: center;
    }

    /* Responsive CSS */
    @media screen and (max-width: 768px) {
        /* Responsive styles here */
    }

</style>
</head>
<body>

<div class="navbar">
    <p>AI Agency</p>
    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">About Us</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>
</div>

<div class="hero">
    <h1>Welcome to AI Agency</h1>
    <p>Your partner in the digital world</p>
    <a href="#" class="button">Get Started</a>
</div>

<div class="pricing">
    <h2>Pricing</h2>
    <p>Choose a plan that's right for your business</p>
    <div class="pricing-plans">
        <div class="plan">
            <h3>Basic</h3>
            <p>$99/month</p>
            <button>Select</button>
        </div>
        <div class="plan">
            <h3>Pro</h3>
            <p>$199/month</p>
            <button>Select</button>
        </div>
        <div class="plan">
            <h3>Enterprise</h3>
            <p>Contact Us</p>
            <button>Contact</button>
        </div>
    </div>
</div>

<div class="footer">
    <p>&copy; 2023 AI Agency. All Rights Reserved.</p>
</div>

</body>
</html>
